<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <style>
    body{
      width:320px; margin:0; padding:14px;
      font:13px/1.5 -apple-system, "Segoe UI", Roboto, sans-serif;
      background:#14151C; color:#ECECF3;
    }
    h1{ font-size:14px; margin:0 0 2px; }
    .sub{ font-size:10.5px; color:#8E90A5; margin-bottom:12px; }
    button{
      display:block; width:100%; margin-bottom:8px; padding:9px 12px;
      font:600 12.5px inherit; color:#ECECF3; text-align:left; cursor:pointer;
      background:#1F212C; border:1px solid #2C2F3E; border-radius:9px;
    }
    button:hover{ background:#262939; }
    button.primary{ background:#3538CD; border-color:#3538CD; }
    button.primary:hover{ background:#2E31B8; }
    button:disabled{ opacity:.5; cursor:default; }
    #status{
      min-height:18px; margin-top:4px; font-size:11.5px; line-height:1.5;
      color:#8E90A5; white-space:pre-wrap; word-break:break-word;
    }
    #status.ok{ color:#4ade80; }
    #status.err{ color:#f87171; }
    #job{
      display:none; margin:8px 0 4px; padding:8px 10px; font-size:11.5px; line-height:1.55;
      background:#1B1D26; border:1px solid #2C2F3E; border-radius:8px;
    }
    #job b{ display:block; }
    #ask{ display:none; margin-top:10px; }
    #ask .lbl{
      font:600 9px ui-monospace, monospace; letter-spacing:.12em; color:#6C6E84;
      margin-bottom:5px;
    }
    #ask ul{ margin:0; padding-left:16px; max-height:150px; overflow:auto; }
    #ask li{ font-size:11.5px; color:#C4C5D4; margin-bottom:3px; }
    .foot{ margin-top:10px; font-size:9.5px; color:#53556C; line-height:1.5; }
  </style>
</head>
<body>
  <h1>CareerPilot Helper</h1>
  <div class="sub">Fills only empty fields · never submits anything</div>

  <button id="save" class="primary">💾 Save Current Job</button>
  <button id="importli">📋 Import LinkedIn Jobs</button>
  <button id="fill">✍️ Autofill Application</button>
  <button id="open">🧭 Open CareerPilot</button>

  <div id="job"></div>
  <div id="status"></div>

  <div id="ask">
    <div class="lbl">NEEDS YOUR ANSWER</div>
    <ul id="ask-list"></ul>
  </div>

  <div class="foot">
    Backend: http://127.0.0.1:8000 · profile is read locally, nothing leaves your machine.
  </div>

  <script src="popup.js"></script>
</body>
</html>
