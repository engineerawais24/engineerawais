<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CareerPilot AI</title>
  <script>
    /* apply saved theme before first paint to avoid a flash */
    try {
      var u = JSON.parse(localStorage.getItem('careerpilot_ui_v1') || '{}');
      if (u.theme === 'dark') document.documentElement.dataset.theme = 'dark';
      if (u.accent && u.accent !== 'indigo') document.documentElement.dataset.accent = u.accent;
    } catch (e) { /* defaults */ }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/profile.css">
  <link rel="stylesheet" href="css/applications.css">
  <link rel="stylesheet" href="css/resumes.css">
  <link rel="stylesheet" href="css/jobs.css">
  <link rel="stylesheet" href="css/sources.css">
  <link rel="stylesheet" href="css/companies.css">
  <link rel="stylesheet" href="css/polish.css">
</head>
<body>

  <div class="shell">

    <aside class="rail">
      <div class="rail-logo">
        <div class="mark"><i></i></div>
        <div>
          <div class="name">CareerPilot <span style="color:#8082E2">AI</span></div>
          <div class="tag">SPRINT 9C · UI MVP</div>
        </div>
      </div>

      <div class="rail-label">WORKSPACE</div>
      <div id="nav"></div>

      <div class="rail-user">
        <div class="avatar">YO</div>
        <div class="who"><b>You</b><span>Pro · 1 seat</span></div>
      </div>
    </aside>

    <div class="main">
      <header class="topbar">
        <h1 id="screen-title">Dashboard</h1>
        <div class="sync"><i></i> Last sync 6:00 AM</div>
        <div class="gsearch">
          <span class="gs-icon" id="gs-icon"></span>
          <input id="gsearch-input" type="text" autocomplete="off" spellcheck="false"
                 placeholder="Search applications…"
                 oninput="Search.onInput(this.value)" onkeydown="Search.onKey(event)" onblur="Search.onBlur()">
          <span class="gs-kbd">Ctrl K</span>
          <div class="gs-drop" id="gs-drop" hidden></div>
        </div>
        <button class="btn btn-primary" onclick="runDailySearch()">Run daily search</button>
      </header>

      <main id="screen" class="screen">
        <!-- boot skeleton — replaced by the first navigate() -->
        <div class="skel" style="width:220px; height:20px; margin-bottom:18px"></div>
        <div class="grid grid-4">
          <div class="skel" style="height:88px"></div><div class="skel" style="height:88px"></div>
          <div class="skel" style="height:88px"></div><div class="skel" style="height:88px"></div>
        </div>
        <div class="skel" style="height:120px; margin-top:12px"></div>
        <div class="skel" style="height:260px; margin-top:12px"></div>
      </main>
    </div>

  </div>

  <div id="toasts"></div>

  <script src="js/data.js"></script>
  <script src="js/lib/icons.js"></script>
  <script src="js/lib/notify.js"></script>
  <script src="js/lib/activity.js"></script>
  <script src="js/lib/theme.js"></script>
  <script src="js/lib/master-resume.js"></script>
  <script src="js/profile/profile-store.js"></script>
  <script src="js/profile/profile-validate.js"></script>
  <script src="js/profile/profile-view.js"></script>
  <script src="js/profile/profile.js"></script>
  <script src="js/applications/applications-store.js"></script>
  <script src="js/applications/applications-view.js"></script>
  <script src="js/applications/applications.js"></script>
  <script src="js/resumes/resumes-store.js"></script>
  <script src="js/resumes/resumes-view.js"></script>
  <script src="js/resumes/tailor-engine.js"></script>
  <script src="js/resumes/resumes.js"></script>
  <script src="js/jobs/jobs-store.js"></script>
  <script src="js/jobs/match-engine.js"></script>
  <script src="js/jobs/decision-engine.js"></script>
  <script src="js/jobs/jobs-view.js"></script>
  <script src="js/jobs/jobs.js"></script>
  <script src="js/companies/companies-store.js"></script>
  <script src="js/companies/rank-engine.js"></script>
  <script src="js/companies/companies-view.js"></script>
  <script src="js/sources/sources-store.js"></script>
  <script src="js/sources/connector-base.js"></script>
  <script src="js/sources/connector-config.js"></script>
  <script src="js/sources/connectors.js"></script>
  <script src="js/sources/daily-search.js"></script>
  <script src="js/sources/sources-view.js"></script>
  <script src="js/search/search.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
